name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Compile NexusWpp
        shell: pwsh
        run: .\compile.ps1
